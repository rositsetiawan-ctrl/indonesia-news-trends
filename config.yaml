# ==========================================================================
# Indonesia Tech & AI News Trends — configuration
# Niche: technology, AI, startups, gadgets, digital economy in Indonesia.
# Style: hype hook + short explainer payoff.
# ==========================================================================

lookback_days: 2          # tech moves a bit slower than breaking news; 2d gives volume
top_stories: 8
min_cluster_size: 2
caption_lang: id          # "id" or "en"
caption_style: mix        # "mix" (hook + explainer), "hype", or "explainer"

# ---- Google News Indonesia backbone ----
google_news:
  enabled: true
  hl: id
  gl: ID
  ceid: "ID:id"
  # Keep the tech-relevant sections only
  topics:
    - TECHNOLOGY
    - SCIENCE
    - BUSINESS        # captures startup funding / digital economy stories

# ---- Niche search queries (Google News search, no API key) ----
# These pull tech/AI stories from ALL Indonesian media at once.
search_queries:
  - "kecerdasan buatan OR AI Indonesia"
  - "startup Indonesia pendanaan"
  - "teknologi terbaru Indonesia"
  - "gadget OR smartphone rilis Indonesia"
  - "fintech OR ecommerce Indonesia"
  - "data center OR cloud Indonesia"
  - "keamanan siber OR cyber security Indonesia"
  - "Gojek OR Tokopedia OR GoTo OR Bukalapak"

# ---- Tech-focused Indonesian portals ----
# Pulled THROUGH Google News site: search so they keep working even if a
# portal's own RSS is down.
portals:
  - name: Detik Inet
    site: inet.detik.com
    direct_rss: ""
  - name: Kompas Tekno
    site: tekno.kompas.com
    direct_rss: ""
  - name: CNBC Indonesia Tech
    site: cnbcindonesia.com/tech
    direct_rss: ""
  - name: DailySocial
    site: dailysocial.id
    direct_rss: ""
  - name: Tech in Asia ID
    site: id.techinasia.com
    direct_rss: ""
  - name: Uzone
    site: uzone.id
    direct_rss: ""
  - name: Kumparan Tech
    site: kumparan.com/kumparantech
    direct_rss: ""

prefer_direct_rss: false

# ---- Niche keyword filter ----
# An article is kept only if its title contains at least one of these terms.
# This keeps the feed on-topic even when a broad source slips in.
# Set `enabled: false` to keep everything the sources return.
keyword_filter:
  enabled: true
  any_of:
    - ai
    - "artificial intelligence"
    - kecerdasan buatan
    - chatgpt
    - openai
    - gemini
    - teknologi
    - tech
    - startup
    - aplikasi
    - aplikasi
    - gadget
    - smartphone
    - hp
    - iphone
    - samsung
    - laptop
    - fintech
    - ecommerce
    - e-commerce
    - digital
    - internet
    - data
    - cloud
    - siber
    - cyber
    - robot
    - software
    - chip
    - semikonduktor
    - gojek
    - tokopedia
    - goto
    - shopee
    - bukalapak
    - blockchain
    - kripto
    - crypto

output_dir: output
data_dir: data
